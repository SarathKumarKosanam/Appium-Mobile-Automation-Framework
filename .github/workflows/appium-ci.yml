name: Enterprise Appium CI - Extent Reports

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Manual trigger for ad-hoc testing

jobs:
  automation-suite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 1. INDUSTRY STEP: Securely pass LambdaTest Credentials
      - name: Execute Appium Tests
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: |
          mvn clean test \
          -DexecutionEnv=cloud \
          -DLT_USERNAME=$LT_USERNAME \
          -DLT_ACCESS_KEY=$LT_ACCESS_KEY

      # 2. REPORTING: Upload Extent Report as a Build Artifact
      - name: Archive Test Reports
        if: always() # Runs even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Extent-Report
          # Replace 'target/ExtentReport.html' with your actual path
          path: |
            target/ExtentReport.html
            target/screenshots/
          retention-days: 30 # Industry standard for keeping logs